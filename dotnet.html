<!doctype html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" href="FAVICON/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="FAVICON/favicon.svg" />
    <link rel="shortcut icon" href="FAVICON/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="FAVICON/apple-touch-icon.png" />
    <link rel="manifest" href="FAVICON/site.webmanifest" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <link rel="stylesheet" href="CSS/Style.css" />

    <style>
        .code-editor {
            color: #d4d4d4;
            font-family: "Cascadia Code", Consolas, "Courier New", monospace;
            font-size: 12px;
            line-height: 1.75;
            white-space: pre;
            tab-size: 4;
        }

        .code-editor .cs-comment { color: #6ca153; }
        .code-editor .cs-string { color: #d68e72; }
        .code-editor .cs-number { color: #b2d69e; }
        .code-editor .cs-keyword-control { color: #ca7ec4; }
        .code-editor .cs-keyword-type { color: #509fe0; }
        .code-editor .cs-method { color: #e0e09f; }
        .code-editor .cs-type { color: #4acfb5; }
        .code-editor .cs-variable { color: #8bcff3; }
        .code-editor .cs-preprocessor { color: #c97cc2; }
    </style>

    <title>Mario Moerman | .NET</title>
</head>
<body class="d-flex flex-column min-vh-100">
    <header id="navbar"></header>

    <main class="flex-grow-1 overflow-x-hidden">
        <div class="container my-3">

            <section class="mb-4 mb-lg-5">
                <div class="p-4 p-md-5 text-bg-dark rounded-4 overflow-hidden">
                    <p class="label mb-2">.NET | C#</p>
                    <h1 class="mb-3">.NET Oefeningen</h1>
                    <p class="mb-0">
                        Hier vind je een overzicht van enkele oefeningen die ik tot nu toe heb uitgewerkt binnen .NET en C#.
                    </p>
                </div>
            </section>

            <section id="dotnetOefeningen" class="mb-4 mb-lg-5"></section>

        </div>
    </main>

    <footer id="footer" class="mt-auto"></footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="JS/App.js"></script>
</body>
</html>
